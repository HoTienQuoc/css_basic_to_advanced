<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text stroke</title>
    <style>
        .stroke-1 {
            font-size: 10em;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            /* -webkit-text-stroke = 
                <line-width> || <color>       
                <line-width> = <length [0,∞]>  |
                hairline | thin | medium |thick           
            */
            -webkit-text-stroke: 6px gold;
            -webkit-text-fill-color: crimson;
        }

        .stroke-2 {
            font-size: 10em;
            font-family: cursive;
            /* -webkit-text-stroke = 
                <line-width> || <color>       
                <line-width> = <length [0,∞]>  |
                hairline | thin | medium |thick           
            */
            -webkit-text-stroke: 5px purple;
            color: crimson;
        }
    </style>
</head>

<body>
    <p class="stroke-1">You are a champion</p>
    <p class="stroke-2">You are an awesome</p>
</body>

</html>
