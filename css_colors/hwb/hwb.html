<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HWB Colours</title>
    <style>
        /* Hue - is expressed as degree 0-360
        Whiteness - is expressed in % (100% = full white, 0% = no whiteness) 
        Blackness - is expressed in % (100% = full black, 0% = no blackness)
        alpha - is opacity, 0-1 (it is preceded with a forward slash)
        hwb(h w b / .5) */
        h1 {
            background-color: hwb(90 0% 0%);
        }

        h2 {
            background-color: hwb(40 0% 60%);
        }

        h3 {
            background-color: hwb(190 0% 0% / .4);
        }
    </style>
</head>

<body>
    <h1>Silence</h1>
    <h2>Joyful</h2>
    <h3>Happiness</h3>
    <h4>Greatness</h4>

</body>

</html>
