<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colours</title>
    <style>
        /* Colors works with color property and background-color property */
        /* colors - keyword colors which are the names of the color  */
        /* Syntax:  */
        /* + color: names of the color */
        /* + background-color: names of the color */
        h1 {
            color: blueviolet;
            opacity: 0.2;
        }

        h2 {
            background-color: darkorange;
            opacity: 0.1;
            color: white;
        }

        /* Hexadecimal colors work with combining numbers of 0-9 and a-f And it is a 6 figures combination */
        /* If the figures occur in equal pairs just write it as 1 figure e.g. #eedd33 is same thing as #ed3 */
        h3 {
            color: #5eea;
        }

        h4 {
            background-color: #000;
            color: #fff;
        }

        /* opacity define the opaqueness or transparency of an element The value is between 
        0 (completely transparent) to 1 (opaque) while */
        p {
            background-color: #906;
        }
    </style>
</head>

<body>
    <h1>Silence</h1>
    <h2>Joyful</h2>
    <h3>Happiness</h3>
    <h4>Greatness</h4>
    <p>Colors are awesome</p>
</body>

</html>
