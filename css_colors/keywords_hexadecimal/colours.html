<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colours</title>
    <style>
        /* Colors works with color property and background-color property */
        /* colors - keyword colors which are the names of the color  */
        h1 {
            color: blueviolet;
        }

        h2 {}
    </style>
</head>

<body>
    <h1>Silence</h1>
    <h2>Joyful</h2>
    <h3>Happiness</h3>
    <h4>Greatness</h4>
</body>

</html>
