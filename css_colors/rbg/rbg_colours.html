<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* rgb() function - it comes with numbers 0-255 */
        h1 {
            color: rgb(255, 255, 25);
        }

        h2 {
            background-color: rgb(46, 129, 222);
        }

        h3 {
            background-color: rgb(3, 227, 12);
            opacity: .2;
        }

        /* rgba() function - accepts a 4th value called ALPHA (opacity) */
        h4 {
            background-color: rgba(251, 56, 247, .2);
        }

        p {
            color: rgb(21, 56, 78);
            background-color: rgb(45, 90, 100, .5);
        }
    </style>
</head>

<body>
    <h1>Silence</h1>
    <h2>Joyful</h2>
    <h3>Happiness</h3>
    <h4>Greatness</h4>
    <p>Colors are awesome</p>
</body>

</html>
