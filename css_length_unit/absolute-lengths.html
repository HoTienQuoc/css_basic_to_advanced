<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Absolute (tuyệt đối) Length units */
        /* in, cm, mm, points(pt), picas(pc), pixels(px) */
        /* 6 picas = 1 inch */
        /* 96 pixels = 1 inch */
        /* 72 points = 1 inch */
        p {
            font-size: 5in;
        }

        address {
            font-size: 5cm;
        }

        var {
            line-height: 200pt;
        }

        h1 {
            background-color: teal;
            width: 60pc;
        }

        pre {
            background-color: gold;
            height: 120px;
        }

        code {
            font-size: 1in;
        }
    </style>
</head>

<body>
    <p>Friends</p>
    <address>3, Bronx, USA</address>
    <var>Dexterity</var>
    <h1>Greatness</h1>
    <pre>Sound mind</pre>
    <code>Dreams</code>
</body>

</html>
